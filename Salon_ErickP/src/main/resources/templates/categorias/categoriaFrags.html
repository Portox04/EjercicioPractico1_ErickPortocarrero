<!DOCTYPE html>
<html>
    <head th:replace="~{general/plantilla :: head}"></head>

    <body>

        <!-- LISTADO DE CATEGORÍAS -->
        <section th:fragment="categoriaList" class="container py-4">

            <div class="row g-4">

                <!-- TABLA -->
                <div class="col-lg-9">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header border-0" style="background:#eae3fd">
                            <h5 class="mb-0 fw-semibold text-dark">
                                <i class="fas fa-layer-group me-2"></i>
                                Listado de categorías
                            </h5>
                        </div>

                        <div class="card-body">

                            <div th:if="${categorias != null and !categorias.empty}">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light">
                                            <tr>
                                                <th>#</th>
                                                <th>Nombre</th>
                                                <th class="text-end">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="c : ${categorias}">
                                                <td class="fw-semibold" th:text="${c.id}"></td>
                                                <td th:text="${c.nombre}"></td>
                                                <td class="text-end">

                                                    <button class="btn btn-sm btn-outline-danger me-1"
                                                            data-bs-toggle="modal"
                                                            data-bs-target="#confirmModal"
                                                            th:data-bs-id="${c.id}"
                                                            th:data-bs-nombre="${c.nombre}">
                                                        <i class="fas fa-trash"></i>
                                                    </button>

                                                    <a th:href="@{/categorias/modificar/{id}(id=${c.id})}"
                                                       class="btn btn-sm btn-outline-dark">
                                                        <i class="fas fa-pen"></i>
                                                    </a>

                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div th:if="${categorias == null or categorias.empty}"
                                 class="text-center text-muted py-4">
                                <i class="fas fa-folder-open fs-3 mb-2"></i>
                                <p class="mb-0">No hay categorías registradas</p>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- RESUMEN -->
                <div class="col-lg-3">
                    <div class="card border-0 shadow-sm text-center">
                        <div class="card-body">
                            <h6 class="text-muted">Total de categorías</h6>
                            <h2 class="fw-bold text-dark" th:text="${totalCategorias}"></h2>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- AGREGAR CATEGORÍA -->
        <section th:fragment="agregarCategoria">

            <div class="d-flex justify-content-end mb-3">
                <button class="btn btn-dark"
                        data-bs-toggle="modal"
                        data-bs-target="#categoriaModal">
                    <i class="fas fa-plus me-1"></i>
                    Agregar categoría
                </button>
            </div>

            <div class="modal fade" id="categoriaModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow">

                        <div class="modal-header" style="background:#eae3fd">
                            <h5 class="modal-title">Agregar categoría</h5>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <form th:action="@{/categorias/guardar}"
                              th:object="${categoria}"
                              method="post">

                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text"
                                           class="form-control"
                                           name="nombre"
                                           required>
                                </div>
                            </div>

                            <div class="modal-footer">
                                <button class="btn btn-outline-secondary"
                                        data-bs-dismiss="modal">
                                    Cancelar
                                </button>
                                <button class="btn btn-dark" type="submit">
                                    Guardar
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </section>

        <!-- CONFIRMAR ELIMINAR -->
        <section th:fragment="confirmarEliminar">

            <div class="modal fade" id="confirmModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow">

                        <form th:action="@{/categorias/eliminar}" method="post">

                            <input type="hidden" name="idCategoria" id="modalId"/>

                            <div class="modal-header" style="background:#eae3fd">
                                <h5 class="modal-title text-dark">
                                    <i class="fas fa-triangle-exclamation me-2"></i>
                                    Confirmar eliminación
                                </h5>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body text-center">
                                <p class="mb-1">¿Deseás eliminar la categoría?</p>
                                <p class="fw-semibold text-dark" id="modalNombre"></p>
                                <small class="text-muted">
                                    Esta acción no se puede deshacer.
                                </small>
                            </div>

                            <div class="modal-footer">
                                <button class="btn btn-outline-secondary"
                                        data-bs-dismiss="modal">
                                    Cancelar
                                </button>
                                <button type="submit" class="btn btn-dark">
                                    Eliminar
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>

        </section>
        <script>
            const confirmModal = document.getElementById('confirmModal');

            if (confirmModal) {
                confirmModal.addEventListener('show.bs.modal', event => {
                    const button = event.relatedTarget;
                    const id = button.getAttribute('data-bs-id');
                    const nombre = button.getAttribute('data-bs-nombre');

                    document.getElementById('modalId').value = id;
                    document.getElementById('modalNombre').textContent = nombre;
                });
            }
        </script>
    </body>
</html>
