<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"      
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:fragment="head">
        <title>Salon</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>  
    </head>
    <body>
        <header th:fragment="header" class="header">
            <nav class="navbar" style="background-color: #eae3fd;" data-bs-theme="light">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Salon</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/categorias/listado}">Categorias</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Servicios</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Reservas</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <section th:fragment="iframeVideo" class="iframe py-4">
            <div class="container">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-2">
                        <div class="ratio ratio-16x9">
                            <iframe 
                                class="rounded"
                                src="https://www.youtube.com/embed/v6Afc1BDQI8"
                                title="Nosotros"
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer th:fragment="footer" class="p-2 mt-5 bg-light.bg-gradient text-dark">
            <p class="lead text-center">Aquí consentimos tu belleza</p>
        </footer>
        
    </body>
